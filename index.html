<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D" Kichin</title>
    <meta name="description" content="Order delicious food from D&quot; Kichin, Bremang New York Junction, Kumasi" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1A1A1A; }
      ::-webkit-scrollbar { display: none; }

      @keyframes floatUp {
        0%   { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
        50%  { opacity: 1; }
        100% { transform: translateY(-120px) rotate(20deg); opacity: 0; }
      }
      @keyframes fadeSlide {
        0%   { opacity: 0; transform: translateX(40px) scale(0.95); }
        15%  { opacity: 1; transform: translateX(0px) scale(1); }
        80%  { opacity: 1; transform: translateX(0px) scale(1); }
        100% { opacity: 0; transform: translateX(-40px) scale(0.95); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
        50%       { transform: scale(1.04); box-shadow: 0 0 0 12px rgba(201,168,76,0); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: translateY(0); }
        40%            { transform: translateY(-8px); }
      }

      .pulse-btn { animation: pulse 2s infinite; }
      .shimmer-text {
        background: linear-gradient(90deg, #C9A84C 0%, #F0D878 40%, #C9A84C 60%, #A8832A 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
