<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D" Kichin</title>
    <meta name="description" content="Order delicious food from D&quot; Kichin, Bremang New York Junction, Kumasi" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #1A1A1A; }
      ::-webkit-scrollbar { display: none; }

      @keyframes floatUp {
        0%   { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
        50%  { opacity: 0.9; }
        100% { transform: translateY(-130px) rotate(25deg); opacity: 0; }
      }

      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .shimmer-text {
        background: linear-gradient(90deg, #C9A84C 0%, #F0D878 40%, #C9A84C 60%, #A8832A 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }

      .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
